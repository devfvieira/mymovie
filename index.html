<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Link Ícons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="modal.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Lista de Filmes para assistir</title>
  </head>
  <body>
    <header>
      <h2><i class="bi bi-film"></i>MyMovies</h2>
      <section id="search-container">
        <div class="input-wrapper movie-name-wrapper">
          <label for="movie-name">Nome</label>
          <input type="text" id="movie-name" />
        </div>
        <div class="input-wrapper movie-year-wrapper">
          <label for="movie-year">Ano</label>
          <input type="text" id="movie-year" />
        </div>
        <button id="search-button"><i class="bi bi-search"></i></button>
      </section>
    </header>
    <main>
      <h2>Comece agora a sua lista de filmes</h2>
      <section id="movie-list"></section>
      <article id="modal-overlay" class="overlay">
        <section id="modal-background"></section>
        <section id="modal-container">
          <h2 id="movie-title">Guardians of the Galaxy - 2014</h2>
          <section id="modal-body">
            <img
              id="movie-poster"
              src="https://m.media-amazon.com/images/M/MV5BM2ZmNjQ2MzAtNDlhNi00MmQyLWJhZDMtNmJiMjFlOWY4MzcxXkEyXkFqcGc@._V1_SX300.jpg"
              alt="Poster do filme."
            />
            <div id="movie-info">
              <div id="movie-plot">
                <h3>
                  A group of intergalactic criminals must pull together to stop
                  a fanatical warrior with plans to purge the universe.
                </h3>
              </div>
              <div id="movie-cast">
                <h4>Elenco</h4>
                <h5>Chris Pratt, Vin Diesel, Bradley Cooper</h5>
              </div>
              <div id="movie-genre">
                <h4>Gênero</h4>
                <h5>Action, Adventure, Comedy</h5>
              </div>
            </div>
          </section>
          <section id="modal-footer">
            <button id="add-to-list">Adicionar à Lista</button>
          </section>
        </section>
      </article>
    </main>

    <script src="script.js"></script>
    <script src="modal.js"></script>
    <script src="key.js"></script>
  </body>
</html>
